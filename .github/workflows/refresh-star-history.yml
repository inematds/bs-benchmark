name: Atualizar Cache do Histórico de Estrelas

on:
  schedule:
    - cron: "17 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Atualizar token de cache-bust
        run: |
          today="$(date -u +%Y%m%d)"
          perl -0pi -e "s#(https://api\\.star-history\\.com/svg\\?repos=inematds/bs-benchmark&type=Date(?:&theme=dark)?)(?:&cachebust=\\d+)?#\$1&cachebust=$today#g" README.md

      - name: Fazer commit das alterações
        run: |
          if git diff --quiet README.md; then
            echo "Sem alterações."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "chore: atualizar cache do histórico de estrelas"
          git push
